name: Auto Invite Collaborator
on:
  issues:
    types: [opened]

jobs:
  invite:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.title, 'invite me')
    steps:
      - name: Send Repository Invite
        uses: mshick/add-collaborator-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          username: ${{ github.event.issue.user.login }}
          permission: write
